name: Daily Market Data

on:
  schedule:
    - cron: '30 1 * * 1-5'   # 北京时间 9:30（UTC 01:30，工作日）
  workflow_dispatch:           # 支持手动触发

jobs:
  fetch-market-data:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch futures data
        run: python scripts/fetch_futures.py

      - name: Fetch stocks data
        run: python scripts/fetch_stocks.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "data: auto-update $(date -u +'%Y-%m-%dT%H:%M:%SZ')" && git push
