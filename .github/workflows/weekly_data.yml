name: Weekly Indicator Data

on:
  schedule:
    - cron: '0 2 * * 1'       # 每周一北京时间 10:00（UTC 02:00）
  workflow_dispatch:

jobs:
  fetch-weekly:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Fetch weekly indicators
        run: |
          # 周度价格/库存/外生指标
          python scripts/fetch_weekly.py
          python scripts/fetch_futures.py
          python scripts/fetch_stocks.py

      - name: Commit weekly data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet && echo "No changes" || \
            git commit -m "data: weekly update $(date -u +'%Y-%m-%dT%H:%M:%SZ')" && git push
